version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: carbrain-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-carbrain}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: carbrain-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
  
  sayyartech-api:
    build: .
    container_name: carbrain-api
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-carbrain}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret}
      DB_HOST: postgres
      MQTT_BROKER: mqtt
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mqtt
    restart: unless-stopped

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
