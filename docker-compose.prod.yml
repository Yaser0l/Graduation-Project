version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sayyartech-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-carbrain}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: sayyartech-mqtt
    ports:
      - "1883:1883"
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  sayyartech-iot-simulator:
    image: abo3skr/sayyar-tech-esp32s3simulator
    container_name: sayyartech-iot-simulator
    tty: true
    stdin_open: true
    restart: unless-stopped
    network_mode: "host"
    ports:
      - "5001:80"
    depends_on:
      mqtt:
          condition: service_healthy
      sayyartech-car_simulator:
          condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'HTTP server started on port 80' /project/qemu.log"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  sayyartech-car_simulator:
    image: abo3skr/sayyar-tech-car_simulator
    container_name: sayyartech-car_simulator
    network_mode: "host"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib, sys; p=pathlib.Path('/sys/class/net/vcan0/statistics/tx_packets');\ntry:\n    count=int(p.read_text().strip()) if p.exists() else 0\nexcept Exception:\n    count=0\nsys.exit(0 if count > 0 else 1)"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  sayyartech-api:
    image: abo3skr/sayyar-tech-backend
    container_name: sayyartech-api
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-CarBrain Backend}
      API_V1_STR: ${API_V1_STR:-/api}
      ENV: ${ENV:-production}
      PORT: ${BACKEND_PORT:-5000}
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-carbrain}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_random_64_char_string}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["*"]}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      MQTT_USER: ${MQTT_USER:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_TOPIC_DTC: ${MQTT_TOPIC_DTC:-MechanicAI/user1/+/DTC}
      LLM_BASE_URL: http://sayyartech-llm:8000
      LLM_ANALYZE_PATH: /api/llm/analyze
      LLM_CHAT_PATH: /api/llm/chat
      LLM_FULL_REPORT_PATH: /api/llm/full-report
      LLM_API_KEY: ${LLM_API_KEY:-}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-your_email@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-your_app_password}
      MAIL_FROM: ${MAIL_FROM:-"CarBrain Diagnostics <noreply@carbrain.app>"}
    ports:
      - "${BACKEND_PORT:-5000}:${BACKEND_PORT:-5000}"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/internal/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
          condition: service_healthy
      mqtt:
          condition: service_healthy
      sayyartech-iot-simulator:
          condition: service_started
      sayyartech-llm:
          condition: service_healthy
    restart: unless-stopped

  sayyartech-llm:
    image: abo3skr/sayyar-tech-agentic_workflow
    container_name: sayyartech-llm
    environment:
      PORT: ${AGENTIC_PORT:-8000}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BASE_URL: ${BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-glm-5.1}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_DATASET_REPO: ${HF_DATASET_REPO:-aziz9788/automotive-rag-kb}
      RAG_STARTUP_MODE: ${RAG_STARTUP_MODE:-sync}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    ports:
      - "${AGENTIC_PORT:-8000}:${AGENTIC_PORT:-8000}"
    restart: unless-stopped
  
  sayyartech-frontend:
    image: abo3skr/sayyar-tech-frontend
    container_name: sayyartech-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      sayyartech-api:
          condition: service_healthy
      sayyartech-llm:
          condition: service_healthy

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:

secrets:
  hf_token:
    environment: HF_TOKEN
