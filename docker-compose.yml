version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: carbrain-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-carbrain}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: carbrain-mqtt
    ports:
      - "1883:1883"
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  sayyartech-iot-simulator:
    build: 
      context: ./IoT/Mechanic
      dockerfile: Dockerfile
      args:
        MQTT_HOST: 10.0.2.2
        MQTT_PORT: 1883    
    container_name: carbrain-iot-simulator
    tty: true
    stdin_open: true
    restart: no
    network_mode: "host"
    ports:
      - "5001:80"
    depends_on:
      mqtt:
          condition: service_healthy
      sayyartech-car_simulator:
          condition: service_started

  sayyartech-car_simulator:
    build: 
      context: ./IoT/cantools_env
      dockerfile: Dockerfile
    container_name: carbrain-car_simulator
    network_mode: "host"
    restart: no
  
  sayyartech-api:
    image: abo3skr/sayyar-tech-backend:latest
    container_name: carbrain-api
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-CarBrain Backend}
      API_V1_STR: ${API_V1_STR:-/api}
      ENV: ${ENV:-development}
      PORT: ${PORT:-5000}
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-carbrain}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_random_64_char_string}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      MQTT_USER: ${MQTT_USER:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_TOPIC_DTC: ${MQTT_TOPIC_DTC:-vehicle/+/dtc}
      LLM_BASE_URL: http://sayyartech-llm:8000
      LLM_ANALYZE_PATH: /api/llm/analyze
      LLM_CHAT_PATH: /api/llm/chat
      LLM_FULL_REPORT_PATH: /api/llm/full-report
      LLM_API_KEY: ${LLM_API_KEY:-}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-your_email@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-your_app_password}
      MAIL_FROM: ${MAIL_FROM:-"CarBrain Diagnostics <noreply@carbrain.app>"}
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/internal/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 3

    depends_on:
      postgres:
          condition: service_healthy
      mqtt:
          condition: service_healthy
    restart: "no"

  sayyartech-llm:
    image: abo3skr/sayyar-tech-agentic_workflow:latest
    container_name: carbrain-llm
    environment:
      PORT: ${LLM_PORT:-8000}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BASE_URL: ${BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-glm-5.1}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}
    ports:
      - "8000:8000"
    restart: "no"
  
  sayyartech-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carbrain-frontend
    ports:
      - "5173:80"
    restart: "no"
    depends_on:
      sayyartech-api:
          condition: service_healthy
      sayyartech-llm:
          condition: service_started

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
