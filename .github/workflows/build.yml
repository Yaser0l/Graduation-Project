name: Project Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  iot-mechanic-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            iot:
              - 'IoT/Mechanic/**'

      - name: esp-idf build
        if: steps.filter.outputs.iot == 'true' || startsWith(github.ref, 'refs/tags/')
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32s3
          path: "IoT/Mechanic"

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: backend
            dockerfile: backend/Dockerfile
            image: sayyar-tech-backend
            cache_from: type=gha,scope=backend
            cache_to: type=gha,mode=max,scope=backend

          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            image: sayyar-tech-frontend
            cache_from: type=gha,scope=frontend
            cache_to: type=gha,mode=max,scope=frontend

          # Registry caching explicitly set for agentic workflow
          - name: agentic_workflow
            context: Agentic_Workflow
            dockerfile: Agentic_Workflow/Dockerfile
            image: sayyar-tech-agentic_workflow
            cache_from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sayyar-tech-agentic_workflow:buildcache
            cache_to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sayyar-tech-agentic_workflow:buildcache,mode=max

          - name: esp32s3simulator
            context: IoT/Mechanic
            dockerfile: IoT/Mechanic/Dockerfile
            image: sayyar-tech-esp32s3simulator
            cache_from: type=gha,scope=esp32s3simulator
            cache_to: type=gha,mode=max,scope=esp32s3simulator

          - name: car_simulator
            context: IoT/cantools_env
            dockerfile: IoT/cantools_env/Dockerfile
            image: sayyar-tech-car_simulator
            cache_from: type=gha,scope=car_simulator
            cache_to: type=gha,mode=max,scope=car_simulator
            
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            module:
              - '${{ matrix.context }}/**'

      # Automatically generates tags based on the GitHub event
      - name: Extract Docker metadata
        id: meta
        if: steps.filter.outputs.module == 'true' || startsWith(github.ref, 'refs/tags/')
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}
          tags: |
            # 1. Pushes to main get tagged as 'main'
            type=ref,event=branch
            # 2. PRs get tagged as 'pr-123'
            type=ref,event=pr
            # 4. Release tags (v1.0.0) get tagged as '1.0.0'
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        if: steps.filter.outputs.module == 'true' || startsWith(github.ref, 'refs/tags/')
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.filter.outputs.module == 'true' || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Single build and push step combining caching, dynamic tagging, and conditional pushing
      - name: Build and push Docker image
        if: steps.filter.outputs.module == 'true' || startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: ${{ matrix.cache_from }}
          cache-to: ${{ matrix.cache_to }}