name: Project Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  iot-mechanic-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            iot:
              - 'IoT/Mechanic/**'

      - name: esp-idf build
        if: steps.filter.outputs.iot == 'true' || startsWith(github.ref, 'refs/tags/')
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32s3
          path: "IoT/Mechanic"

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: backend
            dockerfile: backend/Dockerfile
            image: sayyar-tech-backend

          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            image: sayyar-tech-frontend

          # Registry caching explicitly set for agentic workflow
          - name: agentic_workflow
            context: Agentic_Workflow
            dockerfile: Agentic_Workflow/Dockerfile
            image: sayyar-tech-agentic_workflow

          - name: esp32s3simulator
            context: IoT/Mechanic
            dockerfile: IoT/Mechanic/Dockerfile
            image: sayyar-tech-esp32s3simulator

          - name: car_simulator
            context: IoT/car_simulator
            dockerfile: IoT/car_simulator/Dockerfile
            image: sayyar-tech-car_simulator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup
          sudo docker image prune -af || true

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            module:
              - '${{ matrix.context }}/**'

      # Automatically generates tags based on the GitHub event
      - name: Extract Docker metadata
        id: meta
        if: steps.filter.outputs.module == 'true' || startsWith(github.ref, 'refs/tags/')
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}
          tags: |
            # 1. Pushes to main get tagged as 'main' and 'latest'
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # 2. PRs get tagged as 'pr-123'
            type=ref,event=pr
            # 4. Release tags (v1.0.0) get tagged as '1.0.0'
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        if: steps.filter.outputs.module == 'true' || startsWith(github.ref, 'refs/tags/')
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.filter.outputs.module == 'true' || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Single build and push step combining caching, dynamic tagging, and conditional pushing
      - name: Build and push Docker image
        if: steps.filter.outputs.module == 'true' || startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: ${{ matrix.name == 'agentic_workflow' && format('type=registry,ref={0}/{1}:buildcache', secrets.DOCKER_USERNAME, matrix.image) || format('type=gha,scope={0}', matrix.name) }}
          cache-to: ${{ matrix.name == 'agentic_workflow' && format('type=registry,ref={0}/{1}:buildcache,mode=max', secrets.DOCKER_USERNAME, matrix.image) || format('type=gha,mode=max,scope={0}', matrix.name) }}
